{% extends 'lab5/base.html' %}
{% block content %}
<h1 class="mb-4">Отчёт по пользователям</h1>

<div class="table-responsive">
    <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
            <tr>
                <th>№</th>
                <th>Пользователь</th>
                <th>Количество посещений</th>
            </tr>
        </thead>
        <tbody>
            {% for label, count in rows %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ label }}</td>
                <td>{{ count }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3" class="text-center text-muted">Данные отсутствуют</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<a href="{{ url_for('lab5.export_users_csv') }}" class="btn btn-success">Экспорт в CSV</a>
<a href="{{ url_for('lab5.index') }}" class="btn btn-secondary ms-2">К журналу</a>
{% endblock %}
