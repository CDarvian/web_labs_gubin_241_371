{% extends 'lab2/base.html' %}
{% block content %}
<h2>Параметры формы</h2>
<form method="POST" class="mt-3 mb-4">
    <div class="mb-3">
        <label class="form-label">Тестовое поле 1</label>
        <input type="text" name="field_one" class="form-control" placeholder="Введите что-нибудь">
    </div>
    <div class="mb-3">
        <label class="form-label">Тестовое поле 2</label>
        <input type="text" name="field_two" class="form-control" placeholder="Введите что-нибудь">
    </div>
    <button type="submit" class="btn btn-primary">Отправить</button>
</form>

{% if form %}
    <h4>Данные из POST-запроса:</h4>
    <ul class="list-group">
        {% for key, value in form.items() %}
            <li class="list-group-item"><strong>{{ key }}:</strong> {{ value }}</li>
        {% endfor %}
    </ul>
{% endif %}
{% endblock %}
