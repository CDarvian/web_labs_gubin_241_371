{% extends 'lab2/base.html' %}
{% block content %}
<h2>Параметры URL</h2>
{% if args %}
    <ul class="list-group mt-3">
        {% for key, value in args.items() %}
            <li class="list-group-item"><strong>{{ key }}:</strong> {{ value }}</li>
        {% endfor %}
    </ul>
{% else %}
    <p class="mt-3">Параметры не переданы. Добавьте в URL `?key=value`</p>
{% endif %}
{% endblock %}
